name: build-mac

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  mac:
    runs-on: macos-latest
    env:
      # Opt-in early so JS-based actions don't run on deprecated Node 20.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Node 20 is being removed from GitHub-hosted runners later in 2026.
          # Use a supported LTS for the project build.
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build mac artifacts (dmg + zip)
        run: npm run dist:mac

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NewJeans-Pets-mac
          path: |
            dist/*.dmg
            dist/*.zip
